name: 打包发布 - Windows & macOS

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:   # 允许手动触发

jobs:
  # ─────────────────────────────────────────
  # Windows：打包为单文件 .exe
  # ─────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install Pillow PyQt5 pyinstaller

      - name: 打包为 .exe（单文件）
        run: |
          pyinstaller main.py `
            --name "证件照排版工具" `
            --windowed `
            --onefile `
            --add-data "layout_engine.py;." `
            --hidden-import PIL `
            --hidden-import PIL.Image `
            --hidden-import PIL.ImageDraw `
            --hidden-import PIL.ImageTk `
            --hidden-import PyQt5 `
            --hidden-import PyQt5.QtWidgets `
            --hidden-import PyQt5.QtCore `
            --hidden-import PyQt5.QtGui `
            --clean --noconfirm

      - name: 上传 Windows 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: windows-exe
          path: dist/证件照排版工具.exe

  # ─────────────────────────────────────────
  # macOS：打包为 .app 再制作 .dmg
  # ─────────────────────────────────────────
  build-macos:
    runs-on: macos-latest
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install Pillow PyQt5 pyinstaller
          brew install create-dmg

      - name: 打包为 .app
        run: |
          pyinstaller main.py \
            --name "证件照排版工具" \
            --windowed \
            --onedir \
            --add-data "layout_engine.py:." \
            --hidden-import PIL \
            --hidden-import PIL.Image \
            --hidden-import PIL.ImageDraw \
            --hidden-import PIL.ImageTk \
            --hidden-import PyQt5 \
            --hidden-import PyQt5.QtWidgets \
            --hidden-import PyQt5.QtCore \
            --hidden-import PyQt5.QtGui \
            --clean --noconfirm

      - name: 制作 .dmg 安装包
        run: |
          mkdir -p dmg_staging
          cp -r "dist/证件照排版工具.app" dmg_staging/
          create-dmg \
            --volname "证件照排版工具" \
            --volicon "dist/证件照排版工具.app/Contents/Resources/icon-windowed.icns" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "证件照排版工具.app" 175 190 \
            --hide-extension "证件照排版工具.app" \
            --app-drop-link 425 190 \
            "证件照排版工具.dmg" \
            dmg_staging/ \
          || \
          create-dmg \
            --volname "证件照排版工具" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "证件照排版工具.app" 175 190 \
            --hide-extension "证件照排版工具.app" \
            --app-drop-link 425 190 \
            "证件照排版工具.dmg" \
            dmg_staging/

      - name: 上传 macOS 构建产物
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: 证件照排版工具.dmg

  # ─────────────────────────────────────────
  # 发布 Release：将两个产物上传到 GitHub Release
  # ─────────────────────────────────────────
  release:
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: 下载 Windows 产物
        uses: actions/download-artifact@v4
        with:
          name: windows-exe
          path: artifacts/

      - name: 下载 macOS 产物
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: artifacts/

      - name: 列出产物
        run: ls -lh artifacts/

      - name: 创建/更新 GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name || 'v1.0' }}
          name: 证件照排版工具 ${{ github.ref_name || 'v1.0' }}
          body: |
            ## 证件照自动排版工具

            ### 下载说明
            | 系统 | 文件 | 说明 |
            |------|------|------|
            | Windows | `证件照排版工具.exe` | 双击直接运行，无需安装 |
            | macOS | `证件照排版工具.dmg` | 打开后拖入 Applications 即可 |

            ### 功能
            - 一寸排版（3×3，9张）
            - 二寸排版（2×2，4张）
            - 小二寸排版（2×2，4张）
            - 三寸排版（1×2，2张）
            - 驾驶证排版（5×2，10张）
            - 一寸+二寸混排（7寸画布）
            - 自动方向检测 · 深灰描边 · 导出 300DPI JPG
            - 完全离线，无需联网
          files: |
            artifacts/证件照排版工具.exe
            artifacts/证件照排版工具.dmg
          draft: false
          prerelease: false
